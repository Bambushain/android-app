workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

.build-base:
  image:
    name: registry.ulbricht.casa/docker-images/android-native-app:latest
    pull_policy: always
  before_script:
    - chmod +x ./gradlew
  cache:
    key: $CI_PROJECT_NAME
    paths:
      - .gradle
  tags:
    - runner-amd64

stages:
  - prepare
  - lint
  - build
  - deploy

read-secure-files:
  image: registry.gitlab.com/gitlab-org/cli:latest
  stage: prepare
  script:
    - glab auth login --job-token $CI_JOB_TOKEN --hostname $CI_SERVER_FQDN --api-protocol $CI_SERVER_PROTOCOL
    - glab -R $CI_PROJECT_PATH securefile download --all --output-dir=".secure_files"
    - glab -R $CI_PROJECT_PATH securefile download --name google-services.json --path app/src/google-services.json
  artifacts:
    paths:
      - $CI_PROJECT_DIR/.secure_files

lint-debug-app:
  stage: lint
  extends:
    - .build-base
  script:
    - ./gradlew -Pci --console=plain lintDebug -PbuildDir=lint
  artifacts:
    paths:
      - app/lint/reports/lint-results-debug.html
    expose_as: "lint-report"
    when: always

lint-release-app:
  stage: lint
  extends:
    - .build-base
  script:
    - ./gradlew -Pci --console=plain lintRelease -PbuildDir=lint
  artifacts:
    paths:
      - app/lint/reports/lint-results-release.html
    expose_as: "lint-report"
    when: always

build-debug-app:
  stage: build
  extends:
    - .build-base
  script:
    - ./gradlew -Pci --console=plain bundleDebug -PbuildDir=build

build-release-app:
  stage: build
  extends:
    - .build-base
  needs:
    - read-secure-files
  script:
    - ./gradlew -Pci --console=plain bundle -PbuildDir=build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never

deploy-alpha-app:
  stage: deploy
  extends:
    - .build-base
  script:
    - bundle update
    - mkdir -p /opt/secure
    - bundle exec fastlane android android
  rules:
    - if: $CI_COMMIT_TAG
